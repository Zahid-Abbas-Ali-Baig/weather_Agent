<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather + Outfit Advisor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #e0f2fe;
            --bg-end: #ede9fe;
            --surface: #ffffff;
            --surface-glass: rgba(255, 255, 255, 0.85);
            --surface-muted: #f8fafc;
            --border: rgba(148, 163, 184, 0.35);
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --accent: #6366f1;
            --gradient-brand: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            --gradient-warm: linear-gradient(135deg, #fbbf24 0%, #f97316 100%);
            --radius: 14px;
            --radius-sm: 10px;
            --radius-lg: 20px;
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, var(--bg-start) 0%, #f0f9ff 40%, var(--bg-end) 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 28px 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 56px);
        }

        .header {
            background: var(--gradient-brand);
            padding: 22px 26px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -60%;
            left: 10%;
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        .header-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.22);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.5rem;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(4px);
        }

        .header-text {
            position: relative;
            z-index: 1;
        }

        .header-text h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .header-text p {
            font-size: 0.8125rem;
            color: rgba(255, 255, 255, 0.88);
            margin-top: 3px;
            font-weight: 500;
        }

        .chat-container {
            flex: 1;
            min-height: 480px;
            overflow-y: auto;
            padding: 24px 22px;
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.5);
            border-radius: 3px;
        }

        .message {
            margin-bottom: 18px;
            animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { text-align: right; }

        .message-content {
            display: inline-block;
            max-width: 88%;
            padding: 13px 17px;
            border-radius: var(--radius);
            font-size: 0.9375rem;
            line-height: 1.55;
            word-wrap: break-word;
            text-align: left;
        }

        .message.user .message-content {
            background: var(--gradient-brand);
            color: #ffffff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 14px rgba(14, 165, 233, 0.35);
        }

        .message.agent .message-content {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }

        .input-container {
            padding: 18px 22px 22px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .input-form {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--surface-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px 6px 6px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-form:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.12);
            background: var(--surface);
        }

        .input-form input {
            flex: 1;
            padding: 10px 0;
            border: none;
            font-size: 0.9375rem;
            font-family: inherit;
            color: var(--text);
            background: transparent;
            outline: none;
        }

        .input-form input::placeholder { color: var(--text-muted); }

        .input-form button {
            padding: 11px 22px;
            background: var(--gradient-brand);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .input-form button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .input-form button:active:not(:disabled) {
            transform: translateY(0);
        }

        .input-form button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .typing {
            display: flex;
            gap: 5px;
            padding: 6px 4px;
        }

        .typing span {
            width: 7px;
            height: 7px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1.2s infinite ease-in-out both;
        }

        .typing span:nth-child(1) { animation-delay: -0.24s; }
        .typing span:nth-child(2) { animation-delay: -0.12s; }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.35; transform: scale(0.85); }
            40% { opacity: 1; transform: scale(1.1); }
        }

        .startup-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 16px;
        }

        .startup-modal.hidden { display: none; }

        .startup-content {
            background: var(--surface);
            padding: 32px 28px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .startup-content::before {
            content: '👋';
            font-size: 2rem;
            display: block;
            margin-bottom: 12px;
        }

        .startup-content h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .startup-content p {
            margin-bottom: 24px;
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }

        .startup-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 11px 22px;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        }

        .btn-primary {
            background: var(--gradient-brand);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.4);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--surface-muted);
            border-color: var(--primary);
            color: var(--primary-dark);
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .confirm-buttons {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }

        .confirm-buttons .btn {
            flex: 1;
            padding: 10px 16px;
        }

        .disambiguation-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 14px;
        }

        .disambiguation-buttons .btn {
            width: 100%;
            text-align: left;
            padding: 12px 14px;
            font-size: 0.8125rem;
            white-space: normal;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: var(--radius-sm);
        }

        .disambiguation-buttons .btn:hover:not(:disabled) {
            background: #f0f9ff;
            border-color: var(--primary);
            transform: translateX(3px);
        }

        .disambiguation-number {
            font-weight: 700;
            color: var(--primary);
            min-width: 1.5rem;
            height: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e0f2fe;
            border-radius: 6px;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .disambiguation-buttons .btn .pin-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .message.agent .message-content.weather-card {
            max-width: 100%;
            padding: 0;
            overflow: hidden;
            border-radius: var(--radius);
            border: none;
            box-shadow: var(--shadow-md);
        }

        .weather-card-inner { color: var(--text); }

        .weather-hero {
            padding: 22px 22px 18px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .weather-hero::after {
            content: '';
            position: absolute;
            bottom: -30px;
            right: -30px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .weather-hero.hot {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 55%, #f97316 100%);
        }

        .weather-hero.rain {
            background: linear-gradient(135deg, #475569 0%, #334155 50%, #1e40af 100%);
        }

        .weather-hero.wind {
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 50%, #6366f1 100%);
        }

        .weather-hero.cold {
            background: linear-gradient(135deg, #67e8f9 0%, #38bdf8 40%, #818cf8 100%);
        }

        .weather-hero.mild {
            background: linear-gradient(135deg, #7dd3fc 0%, #60a5fa 50%, #a78bfa 100%);
        }

        .weather-hero-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .weather-hero-emoji {
            font-size: 3rem;
            line-height: 1;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.15));
        }

        .weather-temp-large {
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .weather-condition-label {
            font-size: 0.8125rem;
            font-weight: 600;
            opacity: 0.9;
            margin-top: 4px;
            text-align: right;
        }

        .weather-city {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            font-size: 0.9375rem;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .location-pin {
            width: 20px;
            height: 20px;
            object-fit: contain;
            flex-shrink: 0;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
        }

        .weather-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 14px 16px;
            background: var(--surface-muted);
            border-bottom: 1px solid var(--border);
        }

        .weather-stat {
            text-align: center;
            padding: 12px 8px;
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            transition: transform 0.15s;
        }

        .weather-stat:hover {
            transform: translateY(-2px);
        }

        .weather-stat-emoji {
            font-size: 1.25rem;
            display: block;
            margin-bottom: 4px;
        }

        .weather-stat-value {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--text);
        }

        .weather-stat-label {
            font-size: 0.625rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 2px;
            font-weight: 600;
        }

        .outfit-section {
            padding: 18px 20px 22px;
            background: var(--surface);
        }

        .outfit-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8125rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 14px;
        }

        .outfit-header-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #e0f2fe, #ede9fe);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .outfit-icons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .outfit-icon {
            font-size: 1.4rem;
            background: linear-gradient(145deg, #f8fafc, #f1f5f9);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 10px;
            line-height: 1;
            transition: transform 0.15s;
        }

        .outfit-icon:hover {
            transform: scale(1.08);
        }

        .outfit-advice {
            font-size: 0.875rem;
            line-height: 1.65;
            color: var(--text-secondary);
            padding: 12px 14px;
            background: var(--surface-muted);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--primary);
        }

        @media (max-width: 480px) {
            body { padding: 0; }
            .container {
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }
            .chat-container { min-height: 0; }
            .weather-temp-large { font-size: 2.25rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-icon" aria-hidden="true">🌤️</div>
            <div class="header-text">
                <h1>Weather &amp; Outfit Advisor</h1>
                <p>Your personal stylist — powered by live weather data</p>
            </div>
        </header>
        
        <div class="chat-container" id="chat"></div>
        
        <div class="input-container">
            <form class="input-form" id="chatForm">
                <input type="text" id="userInput" placeholder="Where are you today? Try a city name…" autocomplete="off" required>
                <button type="submit" id="sendBtn">Send</button>
            </form>
        </div>
    </div>
    
    <div class="startup-modal {% if not remembered_city %}hidden{% endif %}" id="startupModal">
        <div class="startup-content">
            <h2>Welcome back</h2>
            <p id="rememberedText">Are you still in {{ remembered_city }}?</p>
            <div class="startup-buttons">
                <button class="btn btn-primary" onclick="handleStartup(true)">Yes</button>
                <button class="btn btn-secondary" onclick="handleStartup(false)">No</button>
            </div>
        </div>
    </div>

    <script>
        const chatEl = document.getElementById('chat');
        const formEl = document.getElementById('chatForm');
        const inputEl = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const startupModal = document.getElementById('startupModal');
        
        const MAPS_PIN_ICON = 'https://www.google.com/maps/about/images/icons/maps_512dp.png';
        let isLoading = false;
        function addMessage(text, isUser, options = {}) {
            const msgEl = document.createElement('div');
            msgEl.className = `message ${isUser ? 'user' : 'agent'}`;

            if (!isUser && options.weather) {
                msgEl.innerHTML = `<div class="message-content weather-card">${buildWeatherCard(text, options.weather)}</div>`;
            } else {
                msgEl.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            }

            chatEl.appendChild(msgEl);
            chatEl.scrollTop = chatEl.scrollHeight;

            if (options.needsConfirmation) {
                const btnWrap = document.createElement('div');
                btnWrap.className = 'confirm-buttons';
                btnWrap.innerHTML = `
                    <button class="btn btn-primary" onclick="handleConfirmation(true)">Yes</button>
                    <button class="btn btn-secondary" onclick="handleConfirmation(false)">No</button>
                `;
                msgEl.querySelector('.message-content').appendChild(btnWrap);
            }

            if (options.disambiguationOptions?.length) {
                const btnWrap = document.createElement('div');
                btnWrap.className = 'disambiguation-buttons';
                options.disambiguationOptions.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'btn btn-secondary';
                    btn.innerHTML = `
                        <span class="disambiguation-number">${opt.index + 1}.</span>
                        <img src="${MAPS_PIN_ICON}" alt="" class="pin-icon">
                        ${escapeHtml(opt.label)}
                    `;
                    btn.addEventListener('click', () => handleDisambiguation(opt.index, opt.label));
                    btnWrap.appendChild(btn);
                });
                msgEl.querySelector('.message-content').appendChild(btnWrap);
            }

            return msgEl;
        }

        function getWeatherTheme(weather) {
            const temp = weather.temperature_C ?? 20;
            const rain = weather.precipitation_mm ?? 0;
            const wind = weather.wind_speed_kmh ?? 0;

            if (rain > 0.5) {
                return {
                    theme: 'rain',
                    hero: rain > 3 ? '🌧️' : '🌦️',
                    label: rain > 3 ? 'Rainy' : 'Light rain',
                    statTemp: '🌡️',
                    statRain: '💧',
                    statWind: wind > 30 ? '💨' : '🍃',
                };
            }
            if (temp > 28) {
                return { theme: 'hot', hero: '☀️', label: 'Hot & sunny', statTemp: '🔥', statRain: '☀️', statWind: '💨' };
            }
            if (temp < 15) {
                return { theme: 'cold', hero: '❄️', label: 'Cold', statTemp: '🥶', statRain: rain > 0 ? '🌧️' : '☀️', statWind: '💨' };
            }
            if (wind > 30) {
                return { theme: 'wind', hero: '💨', label: 'Windy', statTemp: '🌡️', statRain: '☀️', statWind: '🌬️' };
            }
            return { theme: 'mild', hero: '⛅', label: 'Partly cloudy', statTemp: '🌡️', statRain: '☀️', statWind: '🍃' };
        }

        function getOutfitIcons(weather, adviceText) {
            const icons = new Set();
            const temp = weather.temperature_C ?? 20;
            const rain = weather.precipitation_mm ?? 0;
            const wind = weather.wind_speed_kmh ?? 0;
            const text = (adviceText || '').toLowerCase();

            if (rain > 0) icons.add('🌂');
            if (wind > 25) icons.add('🧥');
            if (temp > 28) {
                icons.add('🩳');
                icons.add('👕');
                icons.add('🕶️');
                icons.add('🧢');
            } else if (temp < 10) {
                icons.add('🧣');
                icons.add('🧤');
                icons.add('🧥');
                icons.add('👢');
            } else if (temp < 15) {
                icons.add('🧥');
                icons.add('👖');
                icons.add('🥾');
            } else {
                icons.add('👔');
                icons.add('👟');
            }

            const keywordMap = [
                ['umbrella', '🌂'],
                ['raincoat', '🧥'],
                ['jacket', '🧥'],
                ['coat', '🧥'],
                ['layer', '🧥'],
                ['scarf', '🧣'],
                ['boot', '👢'],
                ['sneaker', '👟'],
                ['shorts', '🩳'],
                ['sunglasses', '🕶️'],
                ['hat', '🧢'],
                ['dress', '👗'],
                ['skirt', '👗'],
            ];

            keywordMap.forEach(([word, emoji]) => {
                if (text.includes(word)) icons.add(emoji);
            });

            if (icons.size === 0) icons.add('👕');
            return [...icons].slice(0, 6);
        }

        function buildWeatherCard(advice, weather) {
            const theme = getWeatherTheme(weather);
            const outfitIcons = getOutfitIcons(weather, advice);
            const temp = Math.round(weather.temperature_C ?? 0);
            const rain = weather.precipitation_mm ?? 0;
            const wind = Math.round(weather.wind_speed_kmh ?? 0);
            const city = escapeHtml(weather.city || 'Your city');

            const outfitHtml = outfitIcons
                .map(icon => `<span class="outfit-icon">${icon}</span>`)
                .join('');

            return `
                <div class="weather-card-inner">
                    <div class="weather-hero ${theme.theme}">
                        <div class="weather-hero-top">
                            <div class="weather-hero-emoji">${theme.hero}</div>
                            <div>
                                <div class="weather-temp-large">${temp}°</div>
                                <div class="weather-condition-label">${theme.label}</div>
                            </div>
                        </div>
                        <div class="weather-city">
                            <img src="${MAPS_PIN_ICON}" alt="" class="location-pin">
                            <span>${city}</span>
                        </div>
                    </div>
                    <div class="weather-stats">
                        <div class="weather-stat">
                            <span class="weather-stat-emoji">${theme.statTemp}</span>
                            <div class="weather-stat-value">${temp}°C</div>
                            <div class="weather-stat-label">Temp</div>
                        </div>
                        <div class="weather-stat">
                            <span class="weather-stat-emoji">${theme.statRain}</span>
                            <div class="weather-stat-value">${rain} mm</div>
                            <div class="weather-stat-label">Rain</div>
                        </div>
                        <div class="weather-stat">
                            <span class="weather-stat-emoji">${theme.statWind}</span>
                            <div class="weather-stat-value">${wind} km/h</div>
                            <div class="weather-stat-label">Wind</div>
                        </div>
                    </div>
                    <div class="outfit-section">
                        <div class="outfit-header">
                            <span class="outfit-header-icon">👔</span>
                            What to wear today
                        </div>
                        <div class="outfit-icons">${outfitHtml}</div>
                        <div class="outfit-advice">${escapeHtml(advice)}</div>
                    </div>
                </div>
            `;
        }
        
        function addTyping() {
            const el = document.createElement('div');
            el.className = 'message agent';
            el.id = 'typing';
            el.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            chatEl.appendChild(el);
            chatEl.scrollTop = chatEl.scrollHeight;
        }
        
        function removeTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function setLoading(loading) {
            isLoading = loading;
            sendBtn.disabled = loading;
            inputEl.disabled = loading;
            if (!loading) inputEl.focus();
        }
        
        async function sendChat(message, options = {}) {
            if (!options.skipUserMessage) {
                addMessage(message, true);
            }
            addTyping();
            setLoading(true);
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await res.json();
                removeTyping();
                
                if (data.error) {
                    addMessage(`Error: ${data.error}`, false);
                } else {
                    addMessage(data.reply, false, {
                        needsConfirmation: data.needs_confirmation,
                        weather: data.weather,
                        disambiguationOptions: data.needs_disambiguation ? data.options : null,
                    });
                }
            } catch (err) {
                removeTyping();
                addMessage('Connection error. Please try again.', false);
            }
            
            setLoading(false);
        }

        async function handleConfirmation(confirmed) {
            if (isLoading) return;
            document.querySelectorAll('.confirm-buttons').forEach(el => el.remove());
            await sendChat(confirmed ? 'Yes' : 'No');
        }

        async function handleDisambiguation(index, label) {
            if (isLoading) return;
            document.querySelectorAll('.disambiguation-buttons button').forEach(btn => {
                btn.disabled = true;
            });
            addMessage(label, true);
            addTyping();
            setLoading(true);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: label, disambiguation_index: index })
                });
                const data = await res.json();
                removeTyping();
                if (data.error) {
                    addMessage(`Error: ${data.error}`, false);
                } else {
                    addMessage(data.reply, false, {
                        needsConfirmation: data.needs_confirmation,
                        weather: data.weather,
                        disambiguationOptions: data.needs_disambiguation ? data.options : null,
                    });
                }
            } catch (err) {
                removeTyping();
                addMessage('Connection error. Please try again.', false);
            }

            setLoading(false);
        }
        
        async function handleStartup(useRemembered) {
            startupModal.classList.add('hidden');
            addMessage(useRemembered ? 'Yes' : 'No', true);
            
            if (useRemembered) {
                addTyping();
                setLoading(true);
                
                try {
                    const res = await fetch('/api/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ use_remembered: true })
                    });
                    
                    const data = await res.json();
                    removeTyping();
                    addMessage(data.reply, false, {
                        weather: data.weather,
                        disambiguationOptions: data.needs_disambiguation ? data.options : null,
                    });
                } catch (err) {
                    removeTyping();
                    addMessage('Error starting session.', false);
                }
                
                setLoading(false);
            } else {
                addMessage('Where are you today?', false);
            }
        }
        
        formEl.addEventListener('submit', (e) => {
            e.preventDefault();
            if (isLoading) return;
            
            const message = inputEl.value.trim();
            if (!message) return;
            
            inputEl.value = '';
            sendChat(message);
        });
        
        // Focus input on load
        inputEl.focus();
    </script>
</body>
</html>
